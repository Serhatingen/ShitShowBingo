app = "eren-aktan-bingo"
primary_region = "fra"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  DEFAULT_ROOM = "anaoda"
  CLAIM_TTL_MS = "10000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
