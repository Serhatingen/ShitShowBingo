<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShitShow Bingo - Host</title>
  <link rel="stylesheet" href="/style.css" />
  <script src="/socket.io/socket.io.js"></script>
  <script src="/config.js"></script>
  <script defer src="/client.js"></script>
</head>
<body data-page="host">
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-kicker">HOST PANEL</div>
        <h1>ShitShow Bingo</h1>
      </div>

      <div class="topbar-right">
        <div id="connectionBadge" class="badge badge-offline">Bağlanıyor…</div>
        <div id="hostJoinBadge" class="badge">Bağlı değil</div>
      </div>
    </header>

    <main class="layout layout-host">
      <section class="panel">
        <div class="panel-header">
          <h2>Oda Yönetimi</h2>
        </div>

        <form id="hostForm" class="stack gap-12">
          <div class="field-row">
            <label class="field">
              <span>Oda adı</span>
              <input id="hostRoomInput" type="text" placeholder="anaoda" autocomplete="off" />
            </label>

            <label class="field">
              <span>Host anahtarı</span>
              <input id="hostKeyInput" type="password" placeholder="gizli anahtar" autocomplete="off" />
            </label>
          </div>

          <div class="actions">
            <button id="hostJoinBtn" type="submit" class="btn btn-primary">Odayı Aç / Bağlan</button>
            <button id="resetRoomBtn" type="button" class="btn btn-danger">Odayı Sıfırla</button>
          </div>

          <div id="hostMessage" class="message"></div>
        </form>

        <div class="stats">
          <div class="stat-card">
            <div class="stat-label">Oda</div>
            <div id="statRoom" class="stat-value">-</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Online</div>
            <div id="statOnline" class="stat-value">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">İzleyici</div>
            <div id="statViewers" class="stat-value">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Onaylı Kutu</div>
            <div id="statConfirmed" class="stat-value">0</div>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Bekleyen Talepler</h2>
          <div class="subtle">İzleyici işaretler, host onaylar</div>
        </div>
        <div id="pendingList" class="pending-list empty-state">
          Bekleyen talep yok.
        </div>
      </section>

      <section class="panel panel-span-2">
        <div class="panel-header">
          <h2>Host Kontrol Grid</h2>
          <div class="subtle">Kutulara tıklayarak manuel onay / geri al</div>
        </div>
        <div id="hostGrid" class="bingo-grid"></div>
      </section>

      <section class="panel panel-span-2">
        <div class="panel-header">
          <h2>İlk Bingo Yapanlar</h2>
        </div>
        <div id="winnersList" class="winners-list empty-state">Henüz bingo yok.</div>
      </section>
    </main>
  </div>
</body>
</html>
