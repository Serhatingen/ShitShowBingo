<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShitShow Bingo</title>
  <link rel="stylesheet" href="/style.css" />
  <script src="/socket.io/socket.io.js"></script>
  <script src="/config.js"></script>
  <script defer src="/client.js"></script>
</head>
<body data-page="viewer">
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-kicker">VIEWER</div>
        <h1>ShitShow Bingo</h1>
      </div>

      <div class="topbar-right">
        <div id="connectionBadge" class="badge badge-offline">Bağlanıyor…</div>
        <div id="viewerJoinBadge" class="badge">Katılmadın</div>
      </div>
    </header>

    <main class="layout">
      <section class="panel">
        <div class="panel-header">
          <h2>Odaya Katıl</h2>
        </div>

        <form id="viewerForm" class="stack gap-12">
          <div class="field-row">
            <label class="field">
              <span>Oda adı</span>
              <input id="viewerRoomInput" type="text" placeholder="anaoda" autocomplete="off" />
            </label>

            <label class="field">
              <span>İsmin</span>
              <input id="viewerNameInput" type="text" placeholder="Serhat" autocomplete="off" />
            </label>
          </div>

          <div class="actions">
            <button id="viewerJoinBtn" type="submit" class="btn btn-primary">Katıl</button>
            <button id="bingoBtn" type="button" class="btn btn-gold" disabled>Bingo Bildir</button>
          </div>

          <div id="viewerMessage" class="message"></div>
        </form>

        <div class="stats">
          <div class="stat-card">
            <div class="stat-label">Oda</div>
            <div id="viewerStatRoom" class="stat-value">-</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Online</div>
            <div id="viewerStatOnline" class="stat-value">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Onaylı</div>
            <div id="viewerStatConfirmed" class="stat-value">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Tamamlanan Satır</div>
            <div id="viewerStatLines" class="stat-value">0</div>
          </div>
        </div>
      </section>

      <section class="panel panel-span-2">
        <div class="panel-header">
          <h2>Bingo Kartı</h2>
          <div class="subtle">Sen işaretle, host onaylasın</div>
        </div>
        <div id="viewerGrid" class="bingo-grid"></div>
      </section>

      <section class="panel panel-span-2">
        <div class="panel-header">
          <h2>İlk Bingo Yapanlar</h2>
        </div>
        <div id="winnersList" class="winners-list empty-state">Henüz bingo yok.</div>
      </section>
    </main>
  </div>

  <div id="toast" class="toast"></div>
</body>
</html>
